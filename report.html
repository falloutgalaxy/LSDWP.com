<section class="page-header">

<h1>REPORT AN ISSUE</h1>

<p>

Submit utility outages, damaged infrastructure, or service requests.

</p>

</section>

<section>

<form id="reportForm">

<label>Full Name</label>

<input type="text" required>

<label>Phone Number</label>

<input type="text">

<label>Issue Type</label>

<select required>

<option>Power Outage</option>

<option>Water Outage</option>

<option>Street Lighting</option>

<option>Damaged Utility Pole</option>

<option>Electrical Hazard</option>

<option>Government Facility Issue</option>

<option>Other</option>

</select>

<label>Location</label>

<input type="text" required>

<label>Description</label>

<textarea rows="6" required></textarea>

<button type="submit">

Submit Report

</button>

</form>

<div id="successMessage">

✅ Your report has been submitted to LSDWP.

Reference Number:

<span id="ticket"></span>

</div>

</section>
